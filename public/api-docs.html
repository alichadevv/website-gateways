<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panduan API | Payment Gateway</title>
  <link rel="stylesheet" href="./assets/style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <!-- Drawer -->
  <div class="drawer-overlay" id="drawerOverlay" onclick="toggleDrawer()"></div>
  <div class="drawer" id="drawer">
    <div class="text-center py-4 border-b border-gray-600 mb-4">
      <i class="fas fa-wallet text-3xl text-blue-400"></i>
      <p class="font-bold text-lg mt-1">Gateway</p>
      <p class="text-xs text-gray-400" id="drawerUsername">User</p>
    </div>
    <a href="/public/dashboard.html"><i class="fas fa-chart-pie menu-icon"></i> Dashboard</a>
    <a href="/public/transactions.html"><i class="fas fa-exchange-alt menu-icon"></i> Transaksi</a>
    <a href="/public/withdrawals.html"><i class="fas fa-hand-holding-usd menu-icon"></i> Penarikan</a>
    <a href="/public/profile.html"><i class="fas fa-user menu-icon"></i> Profile</a>
    <a href="/public/api-docs.html" class="active"><i class="fas fa-book menu-icon"></i> Panduan API</a>
    <div class="logout"><a href="#" onclick="logout()"><i class="fas fa-sign-out-alt menu-icon"></i> Logout</a></div>
  </div>

  <!-- Main -->
  <div class="container">
    <div class="navbar">
      <div><button class="drawer-toggle" onclick="toggleDrawer()"><i class="fas fa-bars"></i></button><span class="navbar-brand">Payment Gateway</span></div>
      <div class="navbar-right"><span id="headerUser">User</span><span class="saldo" id="headerSaldo">Rp 0</span></div>
    </div>

    <h2 class="text-2xl font-bold mb-4">Panduan API</h2>
    <div class="card">
      <p class="mb-2">Berikut daftar endpoint yang tersedia di gateway ini.</p>
      <div id="apiDocsList" class="text-sm"></div>
    </div>
  </div>

  <script src="./assets/app.js"></script>
  <script>
    async function loadApiDocs() {
      try {
        const res = await authFetch('/api/api-docs');
        const data = await res.json();
        let html = '<ul class="list-disc pl-5">';
        data.endpoints.forEach(e => {
          html += `<li><strong>${e.method}</strong> ${e.path} — ${e.description}</li>`;
        });
        html += '</ul>';
        document.getElementById('apiDocsList').innerHTML = html;
      } catch (e) { console.error(e); }
    }

    window.loadPageData = loadApiDocs;
    document.addEventListener('DOMContentLoaded', function() {
      if (getToken()) loadApiDocs();
    });
  </script>
</body>
</html>
